name: Batch Transactions Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'contracts/batch/**'
      - 'app/services/batch**'
  pull_request:
    branches: [ main, develop ]

jobs:
  batch_tests:
    runs-on: ubuntu-latest
    name: Batch Transaction Tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Run contract tests
        run: |
          cd contracts/batch
          cargo test --lib --release
      
      - name: Run batch tests
        run: |
          cd contracts/batch
          cargo test --test batch_tests --release
      
      - name: Test TypeScript service
        run: |
          cd app
          npm install
          npm run test -- batchTransactionService
      
      - name: Build for production
        run: |
          cd contracts/batch
          cargo build --release